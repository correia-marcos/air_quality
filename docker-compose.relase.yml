services:
  selenium:
    image: selenium/standalone-firefox:4.34.0-20250717
    shm_size: "2g"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status || exit 1"]
      interval: 10s

  analysis:
    build:
      context: .
      target: final
    image: air_quality_replication:v1.0.0
    depends_on:
      selenium:
        condition: service_healthy
    ports:
      - "8787:8787"
    environment:
      - PASSWORD=replication 
      - USER=rstudio
      - REMOTE_DRIVER_URL=http://selenium:4444
      - IN_DOCKER=true
    volumes:
      # Mount raw data as Read-Only for safety
      - ./data/raw:/air_monitoring/data/raw:ro
      # Mount results so the user can retrieve outputs
      - ./results:/air_monitoring/results